<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pratiksha Herbals</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="navbar">
  <h2>Pratiksha Herbals</h2>
  <div>Cart 🛒 <span id="cart-count">0</span></div>
</div>

<div class="hero">
  <div>
    <h1>Glow Naturally with Herbal Care</h1>
    <button class="btn">Shop Now</button>
  </div>
</div>

<section>
  <h2 style="text-align:center;">Our Products</h2>

  <div class="products">

    <div class="product-card">
      <h3>Keshveda Kaali Mitti</h3>
      <button class="btn" onclick="addToCart('Keshveda')">Add to Cart</button>
    </div>

    <div class="product-card">
      <h3>Narang Orange Peel</h3>
      <button class="btn" onclick="addToCart('Orange Peel')">Add to Cart</button>
    </div>

    <div class="product-card">
      <h3>Nikhar Face Pack</h3>
      <button class="btn" onclick="addToCart('Nikhar')">Add to Cart</button>
    </div>

    <div class="product-card">
      <h3>Neemveda Powder</h3>
      <button class="btn" onclick="addToCart('Neemveda')">Add to Cart</button>
    </div>

  </div>
</section>

<section id="cart-section">
  <h2 style="text-align:center;">Your Cart</h2>
  <ul id="cart-items"></ul>
  <button class="btn" onclick="checkout()">Checkout</button>
</section>

<footer>
  © 2026 Pratiksha Herbals
</footer>

<script src="script.js"></script>

</body>
</html>
