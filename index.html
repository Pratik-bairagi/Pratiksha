<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pratiksha Herbals</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <h2>Pratiksha Herbals</h2>
  <div>Cart 🛒 <span id="cart-count">0</span></div>
</header>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Glow Naturally with Herbal Care</h1>
    <p>Pure • Natural • Ayurvedic</p>
    <button class="btn">Shop Now</button>
  </div>
</section>

<!-- PRODUCTS -->
<section class="products-section">
  <h2>Our Products</h2>

  <div class="products">

    <div class="card">
      <h3>Keshveda Kaali Mitti</h3>
      <button onclick="addToCart('Keshveda')" class="btn">Add to Cart</button>
    </div>

    <div class="card">
      <h3>Narang Orange Peel</h3>
      <button onclick="addToCart('Orange Peel')" class="btn">Add to Cart</button>
    </div>

    <div class="card">
      <h3>Nikhar Face Pack</h3>
      <button onclick="addToCart('Nikhar')" class="btn">Add to Cart</button>
    </div>

    <div class="card">
      <h3>Neemveda Powder</h3>
      <button onclick="addToCart('Neemveda')" class="btn">Add to Cart</button>
    </div>

  </div>
</section>

<!-- CHECKOUT -->
<section class="checkout">
  <h2>Checkout</h2>

  <form onsubmit="placeOrder(event)">
    <input type="text" id="name" placeholder="Full Name" required>
    <input type="text" id="phone" placeholder="Phone" required>
    <input type="text" id="address" placeholder="Address" required>

    <button class="btn">Place Order</button>
  </form>

  <button onclick="sendWhatsApp()" class="btn whatsapp">Order on WhatsApp</button>
</section>

<!-- FOOTER -->
<footer>
  © 2026 Pratiksha Herbals | Natural Beauty
</footer>

<script src="script.js"></script>

</body>
</html>
