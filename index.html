<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pratiksha Herbals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- CSS -->
  <link rel="stylesheet" href="css /style.css">

  <!-- Razorpay -->
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>Pratiksha Herbals</h2>
  <div>Cart 🛒 <span id="cart-count">0</span></div>
</div>

<!-- HERO -->
<div class="hero">
  <div>
    <h1>Glow Naturally with Herbal Care</h1>
    <button class="btn">Shop Now</button>
  </div>
</div>

<!-- PRODUCTS -->
<section>
  <h2>Our Products</h2>

  <div class="products">

    <div class="product-card">
      <h3>Keshveda Kaali Mitti</h3>
      <button onclick="addToCart('Keshveda Kaali Mitti')" class="btn">Add to Cart</button>
    </div>

    <div class="product-card">
      <h3>Narang Orange Peel</h3>
      <button onclick="addToCart('Orange Peel')" class="btn">Add to Cart</button>
    </div>

    <div class="product-card">
      <h3>Nikhar Face Pack</h3>
      <button onclick="addToCart('Nikhar Face Pack')" class="btn">Add to Cart</button>
    </div>

    <div class="product-card">
      <h3>Neemveda Powder</h3>
      <button onclick="addToCart('Neemveda')" class="btn">Add to Cart</button>
    </div>

    <div class="product-card">
      <h3>Multani Mitti</h3>
      <button onclick="addToCart('Multani Mitti')" class="btn">Add to Cart</button>
    </div>

  </div>
</section>

<!-- CHECKOUT -->
<section>
  <h2>Checkout</h2>

  <form onsubmit="placeOrder(event)">
    <input type="text" id="name" placeholder="Full Name" required><br>
    <input type="text" id="phone" placeholder="Phone" required><br>
    <input type="text" id="address" placeholder="Address" required><br>

    <button type="submit" class="btn">Place Order</button>
  </form>

  <br>

  <button onclick="payNow()" class="btn">Pay Online</button>
  <button onclick="sendWhatsApp()" class="btn">Order on WhatsApp</button>

</section>

<!-- FOOTER -->
<footer>
  © 2026 Pratiksha Herbals
</footer>

<script src="script.js"></script>

</body>
</html>
